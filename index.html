  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0418;
      color: #fff;
      overflow-x: hidden;
    }
    .orb-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 10% 20%, #1f0c3c, #0a0418);
    }
    .orb-glow {
      position: fixed;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,90,255,0.25) 0%, rgba(155,90,255,0) 70%);
      filter: blur(100px);
      z-index: -1;
      animation: floatGlow 25s infinite alternate;
    }
    @keyframes floatGlow {
      0% { transform: translate(10%, 20%) scale(1); opacity: 0.3; }
      100% { transform: translate(-10%, -15%) scale(1.4); opacity: 0.6; }
    }
    .wrapper {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 5;
    }
    .side-nav {
      width: 280px;
      background: rgba(15, 12, 30, 0.65);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(155, 90, 255, 0.4);
      padding: 2rem 1rem;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      z-index: 10;
    }
    .logo-area {
      text-align: center;
      padding-bottom: 1rem;
      border-bottom: 1px dashed rgba(155,90,255,0.4);
    }
    .logo-area h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #fff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-items {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      color: #ddd;
      transition: all 0.25s ease;
      cursor: pointer;
      font-weight: 500;
    }
    .nav-item i { width: 24px; }
    .nav-item.active, .nav-item:hover {
      background: #9a4eff;
      color: white;
      box-shadow: 0 0 12px #9a4eff;
      transform: translateX(5px);
    }
    .lang-toggle {
      margin-top: auto;
      background: linear-gradient(135deg, #4e2d89, #2a1a4a);
      border: none;
      padding: 0.6rem;
      border-radius: 2rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: 0.2s;
    }
    .lang-toggle:hover { transform: scale(1.02); background: linear-gradient(135deg, #6b3dc9, #3a1f6e); }
    .main-content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    .hero-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(155,90,255,0.3);
    }
    .hero-title h2 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #fff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero-stats-box {
      display: flex;
      gap: 2rem;
    }
    .hero-stat {
      text-align: center;
    }
    .hero-stat .number {
      font-size: 1.8rem;
      font-weight: 800;
      color: #cb9eff;
    }
    .copy-ip-btn {
      background: #9a4eff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    .copy-ip-btn:active { transform: scale(0.96); }
    .grid-title {
      font-size: 1.6rem;
      margin: 2rem 0 1rem;
      border-left: 4px solid #b87eff;
      padding-left: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .top-players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .top-card {
      background: rgba(20,12,38,0.7);
      backdrop-filter: blur(4px);
      border-radius: 1.2rem;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.25s;
      border: 1px solid rgba(155,90,255,0.3);
    }
    .top-card:hover {
      transform: translateY(-5px);
      border-color: #c084fc;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .top-icon { font-size: 2rem; }
    .top-info h4 { font-size: 1rem; }
    .top-info p { font-size: 0.8rem; opacity: 0.8; }
    .modes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }
    .game-card {
      background: rgba(20,12,38,0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid rgba(155,90,255,0.4);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: 0.5s;
    }
    .game-card:hover::before { left: 100%; }
    .game-card:hover {
      transform: translateY(-10px);
      border-color: #c084fc;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5);
    }
    .game-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .game-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
    .game-desc { font-size: 0.8rem; opacity: 0.7; margin-bottom: 1rem; }
    .game-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      margin-bottom: 1rem;
    }
    .join-game {
      background: #4e2d89;
      border: none;
      padding: 0.5rem;
      border-radius: 2rem;
      color: white;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: 0.1s;
    }
    .join-game:active { transform: scale(0.97); }
    .leaderboard-podium {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .podium-item {
      text-align: center;
      background: rgba(0,0,0,0.5);
      border-radius: 1rem;
      padding: 1rem;
      width: 150px;
      transition: 0.2s;
    }
    .podium-item.first {
      background: linear-gradient(135deg, #ffd700, #ffb347);
      transform: scale(1.05);
      box-shadow: 0 0 15px gold;
    }
    .podium-avatar { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 0.5rem; border: 2px solid #fff; }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(0,0,0,0.4);
      border-radius: 1rem;
      overflow: hidden;
    }
    .leaderboard-table th, .leaderboard-table td {
      padding: 0.8rem;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .leaderboard-table th {
      cursor: pointer;
      transition: 0.1s;
    }
    .leaderboard-table th:hover { color: #c084fc; }
    .footer { text-align: center; margin-top: 2rem; color: #aaa; border-top: 1px solid rgba(155,90,255,0.2); padding-top: 1.5rem; }
    .placeholder {
      text-align: center;
      padding: 3rem;
      background: rgba(0,0,0,0.3);
      border-radius: 1.5rem;
      font-size: 1.2rem;
    }
    @media (max-width: 900px) {
      .wrapper { flex-direction: column; }
      .side-nav { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center; }
      .nav-items { flex-direction: row; flex-wrap: wrap; }
      .lang-toggle { margin-top: 0; }
      .main-content { padding: 1rem; }
      .hero-title h2 { font-size: 1.8rem; }
    }
  </style>
</head>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0418; color: white; overflow-x: hidden; }
  .orb-bg { position: fixed; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 10% 20%, #1f0c3c, #0a0418); }
  .orb-glow { position: fixed; width: 50vw; height: 50vw; border-radius: 50%; background: radial-gradient(circle, rgba(155,90,255,0.3) 0%, rgba(155,90,255,0) 70%); filter: blur(80px); z-index: -1; animation: floatGlow 20s infinite alternate; }
  @keyframes floatGlow { 0% { transform: translate(10%, 20%) scale(1); opacity: 0.4; } 100% { transform: translate(-10%, -10%) scale(1.3); opacity: 0.8; } }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; position: relative; z-index: 2; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-bottom: 2rem; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    padding: 0.6rem 1.5rem; border-radius: 3rem; color: ${color}; text-decoration: none;
    border: 1px solid ${color}; transition: 0.2s; font-weight: 600;
  }
  .back-btn:hover { background: ${color}; color: #000; transform: translateX(-5px); }
  .hero {
    text-align: center; padding: 3rem 1rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px);
    border-radius: 2rem; border-bottom: 4px solid ${color}; margin-bottom: 2rem;
    position: relative; overflow: hidden;
  }
  .hero i { font-size: 5rem; filter: drop-shadow(0 0 12px ${color}); margin-bottom: 0.5rem; display: block; }
  .hero h1 { font-size: 3rem; margin: 0.5rem 0; }
  .hero::after {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    animation: rotateGlow 20s linear infinite;
  }
  @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .ip-section {
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-radius: 2rem; padding: 1rem;
    text-align: center; margin: 2rem 0; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
    border: 1px solid ${color};
  }
  .copy-ip { background: ${color}; border: none; padding: 0.6rem 1.5rem; border-radius: 3rem; color: #000; font-weight: bold; cursor: pointer; }
  .stat-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1.5rem; margin: 2rem 0;
  }
  .stat-card {
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); border-radius: 1.5rem; padding: 1.2rem;
    text-align: center; border-left: 4px solid ${color};
  }
  .stat-card i { font-size: 2rem; color: ${color}; display: block; margin-bottom: 0.5rem; }
  .stat-card .number { font-size: 2rem; font-weight: 800; }
  .leaderboard-container {
    background: rgba(0,0,0,0.5); border-radius: 1.5rem; padding: 1.5rem; margin: 1.5rem 0;
  }
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th, .rank-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent); }
  .feature-tags { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; margin: 1.5rem 0; }
  .feature { background: rgba(0,0,0,0.5); padding: 0.4rem 1rem; border-radius: 2rem; border-left: 2px solid ${color}; }
  footer { text-align: center; margin-top: 2rem; color: #aaa; }
  @media (max-width: 700px) { .hero h1 { font-size: 2rem; } .container { padding: 1rem; } }
</style>
</head>
<body>
<div class="orb-bg"></div>
<div class="orb-glow" style="top:-20%; left:-20%;"></div>
<div class="orb-glow" style="bottom:-30%; right:-20%; animation-duration: 25s;"></div>
<div class="container">
  <a href="#" onclick="window.location.href = localStorage.getItem('otk1_main_url') || '/'; return false;" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Hub</a>
  <div class="hero"><i class="fas ${icon}"></i><h1>${name}</h1><p>${desc}</p></div>
  <div class="ip-section"><span style="font-family: monospace; font-size: 1.3rem;">${serverIp}</span><button class="copy-ip" onclick="navigator.clipboard.writeText('${serverIp}'); alert('${t("copied")}');">📋 ${t("copyIp")}</button></div>
  <div class="stat-cards"><div class="stat-card"><i class="fas fa-users"></i><div class="number" id="liveCount">${mode.players}</div><div>${t("online")}</div></div><div class="stat-card"><i class="fas fa-chart-line"></i><div class="number">20.0</div><div>TPS</div></div><div class="stat-card"><i class="fas fa-crown"></i><div class="number">${top.name}</div><div>Top Player</div></div></div>
  <div class="feature-tags"><div class="feature"><i class="fas fa-check-circle"></i> Competitive</div><div class="feature"><i class="fas fa-check-circle"></i> Leaderboards</div><div class="feature"><i class="fas fa-check-circle"></i> Rewards</div></div>
  <div class="leaderboard-container"><div class="leaderboard-title"><i class="fas fa-trophy"></i> Hall of Fame</div><table class="rank-table"><thead><tr><th>#</th><th>Player</th><th>${top.stat.split(' ')[1]}</th><th>💰 Balance</th></tr></thead><tbody>${leaderboardRows.map(p => `<tr class="rank-${p.rank}"><td><span style="background:#2a1a4a; width:28px;height:28px;display:inline-block;line-height:28px;text-align:center;border-radius:50%;">${p.rank}</span></td><td><i class="fas fa-user"></i> ${p.name}</td><td>${p.stat}</td><td>💰 ${p.balance}</td></tr>`).join('')}</tbody></table></div>
  <footer><i class="fas fa-pickaxe"></i> Otk1 MC · ${name}</footer>
</div>
<script>let count = ${mode.players}; setInterval(() => { count += Math.floor(Math.random() * 11) - 5; count = Math.max(50, count); document.getElementById('liveCount').innerText = count; }, 7000);<\/script>
</body>
</html>`;
  }

  function openLobby(modeId) {
    localStorage.setItem('otk1_main_url', window.location.href);
    const html = generateLobbyPageHTML(modeId);
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.location.href = url;
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function copyMainIP() {
    navigator.clipboard.writeText("play.otk1mc.com");
    alert(t("copied"));
  }

  let activePage = "home";
  function renderPage(page) {
    activePage = page;
    const main = document.getElementById("mainContent");
    if(!main) return;
    if(page === "home") {
      const topPlayersHtml = modes.map(m => `<div class="top-card"><div class="top-icon">${m.icon}</div><div class="top-info"><h4>${m.name[currentLang]}</h4><p>🏆 ${topPlayers[m.id].name}<br>${topPlayers[m.id].stat}</p></div></div>`).join('');
      const modesHtml = modes.map(m => `<div class="game-card" data-mode="${m.id}"><div class="game-icon" style="color:${m.color}">${m.icon}</div><div class="game-name">${m.name[currentLang]}</div><div class="game-desc">${m.desc[currentLang]}</div><div class="game-stats"><span>🔥 ${m.players} ${t("online")}</span><span>🏷️ Competitive</span></div><button class="join-game">${t("lobbyBtn")}</button></div>`).join('');
      main.innerHTML = `
        <div class="hero-stats">
          <div class="hero-title"><h2>${t("hero")}</h2><p>20+ unique game modes</p></div>
          <div class="hero-stats-box"><div class="hero-stat"><div class="number">2,431</div><div>${t("online")}</div></div><div class="hero-stat"><div class="number">4,250</div><div>${t("coins")}</div></div></div>
          <button class="copy-ip-btn" id="copyMainIpBtn"><i class="far fa-copy"></i> ${t("copyIp")}</button>
        </div>
        <div class="grid-title">${t("topTitle")}</div>
        <div class="top-players-grid">${topPlayersHtml}</div>
        <div class="grid-title">${t("gamesTitle")}</div>
        <div class="modes-grid">${modesHtml}</div>
      `;
      document.getElementById("copyMainIpBtn")?.addEventListener("click", copyMainIP);
      document.querySelectorAll(".game-card").forEach(card => {
        const modeId = card.dataset.mode;
        card.addEventListener("click", (e) => { if(e.target.classList.contains("join-game")) e.stopPropagation(); openLobby(modeId); });
        card.querySelector(".join-game")?.addEventListener("click", (e) => { e.stopPropagation(); openLobby(modeId); });
      });
    } else if(page === "leaderboard") {
      main.innerHTML = `<div id="leaderboardContainer">${renderLeaderboardTable()}</div>`;
    } else if(page === "voting") {
      main.innerHTML = `<div class="placeholder"><i class="fas fa-vote-yea"></i> ${t("voteMsg")}</div>`;
    } else if(page === "market") {
      main.innerHTML = `<div class="placeholder"><i class="fas fa-store"></i> ${t("marketMsg")}</div>`;
    } else if(page === "social") {
      main.innerHTML = `<div class="placeholder"><i class="fas fa-comments"></i> ${t("socialMsg")}</div>`;
    }
  }

  // initialize navigation
  document.querySelectorAll(".nav-item").forEach(item => {
    item.addEventListener("click", () => {
      document.querySelectorAll(".nav-item").forEach(nav => nav.classList.remove("active"));
      item.classList.add("active");
      renderPage(item.dataset.page);
    });
  });
  document.querySelector(".nav-item[data-page='home']").classList.add("active");
  renderPage("home");
</script>
</body>
</html>
