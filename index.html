<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otk1 | صانع محتوى ومبرمج</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0710;
            /* خلفية داكنة احتياطية */
            padding: 20px;
            /* التدرج الرئيسي من بنفسجي إلى بنفسجي غامق */
            background: radial-gradient(ellipse at 50% 30%, #7b2ffc, #2d0b4e 70%, #130624);
            background-attachment: fixed;
        }

        /* ===== CARD ===== */
        .card {
            background: rgba(18, 8, 30, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 36px 48px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(180, 100, 255, 0.15);
            text-align: center;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(180, 100, 255, 0.20);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 80px rgba(90, 20, 180, 0.5), 0 0 0 1px rgba(200, 130, 255, 0.3);
        }

        /* ===== AVATAR ===== */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 12px 32px rgba(120, 50, 200, 0.5), 0 0 0 3px rgba(200, 130, 255, 0.25);
            user-select: none;
            transition: box-shadow 0.3s ease;
        }

        .avatar:hover {
            box-shadow: 0 16px 44px rgba(140, 60, 230, 0.7), 0 0 0 4px rgba(210, 150, 255, 0.4);
        }

        /* ===== NAME ===== */
        .name {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e0b3ff, #b77aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
            text-shadow: 0 0 30px rgba(160, 80, 255, 0.3);
        }

        .badge {
            display: inline-block;
            background: rgba(160, 80, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 4px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #c9a6ff;
            border: 1px solid rgba(180, 100, 255, 0.25);
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        /* ===== BIO ===== */
        .bio {
            color: #d4c0f0;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 28px;
            padding: 0 4px;
            font-weight: 400;
        }

        .bio strong {
            color: #e6ccff;
            font-weight: 600;
        }

        .bio .highlight {
            color: #c084fc;
            font-weight: 500;
        }

        /* ===== DIVIDER ===== */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #a855f7, #6b21a8, #a855f7);
            margin: 0 auto 28px;
            border-radius: 10px;
            opacity: 0.7;
        }

        /* ===== SOCIAL BUTTONS ===== */
        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            transition: all 0.25s ease;
            background: rgba(40, 15, 65, 0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(180, 100, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .social-btn i {
            font-size: 22px;
            width: 28px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .social-btn span {
            flex: 1;
            text-align: center;
        }

        /* hover effects per platform */
        .social-btn.tiktok:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: #ff0050;
            box-shadow: 0 8px 28px rgba(255, 0, 80, 0.35);
            transform: scale(1.02);
        }
        .social-btn.tiktok:hover i {
            color: #ff0050;
        }

        .social-btn.youtube:hover {
            background: rgba(30, 10, 40, 0.8);
            border-color: #ff0033;
            box-shadow: 0 8px 28px rgba(255, 0, 50, 0.35);
            transform: scale(1.02);
        }
        .social-btn.youtube:hover i {
            color: #ff0033;
        }

        .social-btn.instagram:hover {
            background: rgba(30, 10, 40, 0.8);
            border-color: #f09433;
            box-shadow: 0 8px 28px rgba(240, 148, 51, 0.35);
            transform: scale(1.02);
        }
        .social-btn.instagram:hover i {
            color: #f09433;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: rgba(180, 150, 210, 0.5);
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(180, 100, 255, 0.08);
            padding-top: 22px;
        }

        .footer i {
            color: rgba(200, 150, 255, 0.4);
            margin: 0 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px 36px;
                border-radius: 36px;
            }
            .avatar {
                width: 100px;
                height: 100px;
                font-size: 38px;
            }
            .name {
                font-size: 28px;
            }
            .bio {
                font-size: 15px;
            }
            .social-btn {
                padding: 14px 16px;
                font-size: 15px;
            }
            .social-btn i {
                font-size: 19px;
                width: 24px;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 24px 16px 30px;
            }
            .name {
                font-size: 24px;
            }
            .bio {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- ===== AVATAR ===== -->
        <div class="avatar">O</div>

        <!-- ===== NAME ===== -->
        <h1 class="name">Otk1</h1>
        <div class="badge">
            <i class="fas fa-code" style="margin-left: 8px;"></i>
            صانع محتوى · مبرمج
        </div>

        <!-- ===== BIO ===== -->
        <p class="bio">
            <strong>🎮 Otk1</strong> — صانع محتوى <span class="highlight">ألعاب منوّعة</span>،
            أشارك تجاربَي في عالم الألعاب مع مجتمعي.
            <br />
            <i class="fas fa-laptop-code" style="color: #b77aff; margin-left: 6px;"></i>
            وأيضاً <strong>مبرمج</strong> متخصص في
            <span class="highlight">تطوير المواقع</span> و
            <span class="highlight">سيرفرات ماين كرافت</span>.
            <br />
            <span style="font-size: 14px; color: #b99ad6;">
                <i class="fas fa-heart" style="color: #c084fc; margin-left: 4px;"></i>
                شغفي التقنية والإبداع
            </span>
        </p>

        <div class="divider"></div>

        <!-- ===== SOCIAL LINKS ===== -->
        <div class="social-grid">

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@otk1141?_r=1&_t=ZS-97H6fwPKSVp"
            target="_blank"
            rel="noopener noreferrer"
            class="social-btn tiktok">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
            <i class="fas fa-arrow-up-right-from-square" style="font-size: 14px; opacity: 0.5;"></i>
        </a>

        <!-- YouTube -->
        <a href="https://youtube.com/@otk1141?si=0APCdeiyfZSV3AMO"
        target="_blank"
        rel="noopener noreferrer"
        class="social-btn youtube">
        <i class="fab fa-youtube"></i>
        <span>YouTube</span>
        <i class="fas fa-arrow-up-right-from-square" style="font-size: 14px; opacity: 0.5;"></i>
    </a>

    <!-- Instagram -->
    <a href="https://www.instagram.com/37.8b?igsh=eWI3MmdjYjNpbXF4"
    target="_blank"
    rel="noopener noreferrer"
    class="social-btn instagram">
    <i class="fab fa-instagram"></i>
    <span>Instagram</span>
    <i class="fas fa-arrow-up-right-from-square" style="font-size: 14px; opacity: 0.5;"></i>
</a>

</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
    <i class="fas fa-crown" style="color: #b77aff;"></i>
    Otk1 · 2026
    <i class="fas fa-infinity" style="margin-right: 6px;"></i>
</div>

</div>

</body>
</html>
